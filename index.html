<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Compressor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3e;
    --accent: #6c63ff;
    --accent-hover: #7d75ff;
    --fg: #e8e9f0;
    --muted: #888ba0;
    --green: #22c55e;
    --red: #ef4444;
    --radius: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header h1 span { color: var(--accent); }

  header p {
    color: var(--muted);
    margin-top: 8px;
    font-size: 0.95rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    width: 100%;
    max-width: 560px;
  }

  /* Drop zone */
  #drop-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 44px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  #drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(108,99,255,0.06);
  }

  #drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  #drop-zone .icon {
    font-size: 2.4rem;
    margin-bottom: 10px;
    display: block;
  }

  #drop-zone .label {
    font-size: 1rem;
    font-weight: 600;
    color: var(--fg);
  }

  #drop-zone .sublabel {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 4px;
  }

  /* File info */
  #file-info {
    display: none;
    align-items: center;
    gap: 12px;
    background: rgba(108,99,255,0.08);
    border: 1px solid rgba(108,99,255,0.25);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 16px;
  }

  #file-info .file-icon { font-size: 1.6rem; }

  #file-info .file-meta { flex: 1; min-width: 0; }

  #file-info .file-name {
    font-weight: 600;
    font-size: 0.9rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #file-info .file-size {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
  }

  #file-info .clear-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 4px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  #file-info .clear-btn:hover { color: var(--red); }

  /* Settings */
  .settings {
    margin-top: 20px;
  }

  .settings label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }

  .quality-btns {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .quality-btn {
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--fg);
    border-radius: 8px;
    padding: 10px 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .quality-btn .q-name {
    font-size: 0.88rem;
    font-weight: 600;
    display: block;
  }

  .quality-btn .q-desc {
    font-size: 0.72rem;
    color: var(--muted);
    display: block;
    margin-top: 2px;
  }

  .quality-btn.active {
    border-color: var(--accent);
    background: rgba(108,99,255,0.12);
    color: var(--fg);
  }

  .quality-btn.active .q-desc { color: rgba(108,99,255,0.8); }

  .quality-btn:hover:not(.active) {
    border-color: #444;
    background: rgba(255,255,255,0.03);
  }

  /* Compress button */
  #compress-btn {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 9px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }

  #compress-btn:hover:not(:disabled) { background: var(--accent-hover); }
  #compress-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* Progress */
  #progress-wrap {
    display: none;
    margin-top: 20px;
  }

  #progress-bar-bg {
    background: var(--border);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.3s;
    width: 0%;
  }

  #progress-label {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 7px;
    text-align: center;
  }

  /* Result */
  #result {
    display: none;
    margin-top: 20px;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border-bottom: 1px solid var(--border);
  }

  .stat {
    padding: 14px 12px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }

  .stat .s-label {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .stat .s-value {
    font-size: 1.05rem;
    font-weight: 700;
    margin-top: 4px;
  }

  .stat .s-value.green { color: var(--green); }
  .stat .s-value.red { color: var(--red); }

  #download-btn {
    display: block;
    width: 100%;
    padding: 13px;
    background: var(--green);
    color: #fff;
    border: none;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  #download-btn:hover { background: #16a34a; }

  /* Footer */
  footer {
    margin-top: 32px;
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
  }

  footer a { color: var(--muted); }

  .privacy-note {
    margin-top: 12px;
    font-size: 0.78rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
</style>
</head>
<body>

<header>
  <h1>PDF <span>Compressor</span></h1>
  <p>Reduce PDF file size — free, fast, and 100% in your browser</p>
</header>

<div class="card">
  <!-- Drop zone -->
  <div id="drop-zone">
    <input type="file" id="file-input" accept=".pdf,application/pdf">
    <span class="icon">📄</span>
    <div class="label">Drop your PDF here</div>
    <div class="sublabel">or click to browse</div>
  </div>

  <!-- File info -->
  <div id="file-info">
    <span class="file-icon">📄</span>
    <div class="file-meta">
      <div class="file-name" id="file-name-label">—</div>
      <div class="file-size" id="file-size-label">—</div>
    </div>
    <button class="clear-btn" onclick="clearFile()" title="Remove file">✕</button>
  </div>

  <!-- Quality setting -->
  <div class="settings">
    <label>Compression Level</label>
    <div class="quality-btns">
      <button class="quality-btn" data-quality="72" onclick="setQuality(this)">
        <span class="q-name">Low</span>
        <span class="q-desc">Smaller file<br>Some quality loss</span>
      </button>
      <button class="quality-btn active" data-quality="60" onclick="setQuality(this)">
        <span class="q-name">Medium</span>
        <span class="q-desc">Balanced<br>Recommended</span>
      </button>
      <button class="quality-btn" data-quality="40" onclick="setQuality(this)">
        <span class="q-name">High</span>
        <span class="q-desc">Smallest file<br>More quality loss</span>
      </button>
    </div>
  </div>

  <!-- Compress -->
  <button id="compress-btn" disabled onclick="compress()">Select a PDF to compress</button>

  <!-- Progress -->
  <div id="progress-wrap">
    <div id="progress-bar-bg"><div id="progress-bar"></div></div>
    <div id="progress-label">Processing...</div>
  </div>

  <!-- Result -->
  <div id="result">
    <div class="result-stats">
      <div class="stat">
        <div class="s-label">Original</div>
        <div class="s-value" id="r-original">—</div>
      </div>
      <div class="stat">
        <div class="s-label">Compressed</div>
        <div class="s-value" id="r-compressed">—</div>
      </div>
      <div class="stat">
        <div class="s-label">Saved</div>
        <div class="s-value green" id="r-saved">—</div>
      </div>
    </div>
    <button id="download-btn" onclick="downloadResult()">⬇ Download Compressed PDF</button>
  </div>
</div>

<div class="privacy-note">🔒 Your files never leave your device — all processing is done locally in your browser</div>

<footer>
  Built with <a href="https://pdf-lib.js.org/" target="_blank">pdf-lib</a> &amp; canvas image resampling
</footer>

<!-- pdf-lib -->
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

<script>
let selectedFile = null;
let compressedBytes = null;
let selectedQuality = 60; // JPEG quality 0-100

// ── Drag & drop ──
const dropZone = document.getElementById('drop-zone');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') setFile(file);
  else alert('Please drop a PDF file.');
});

document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) setFile(e.target.files[0]);
});

function setFile(file) {
  selectedFile = file;
  compressedBytes = null;
  document.getElementById('file-name-label').textContent = file.name;
  document.getElementById('file-size-label').textContent = fmtBytes(file.size);
  document.getElementById('file-info').style.display = 'flex';
  document.getElementById('result').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  const btn = document.getElementById('compress-btn');
  btn.disabled = false;
  btn.textContent = 'Compress PDF';
}

function clearFile() {
  selectedFile = null;
  compressedBytes = null;
  document.getElementById('file-info').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('file-input').value = '';
  const btn = document.getElementById('compress-btn');
  btn.disabled = true;
  btn.textContent = 'Select a PDF to compress';
}

function setQuality(el) {
  document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedQuality = parseInt(el.dataset.quality);
}

function setProgress(pct, label) {
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = label;
}

// ── Core compression ──
async function compress() {
  if (!selectedFile) return;

  const btn = document.getElementById('compress-btn');
  btn.disabled = true;
  btn.textContent = 'Compressing…';
  document.getElementById('result').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'block';
  setProgress(5, 'Reading PDF…');

  try {
    const arrayBuffer = await selectedFile.arrayBuffer();
    setProgress(15, 'Parsing pages…');

    const { PDFDocument } = PDFLib;
    const srcDoc = await PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
    const outDoc = await PDFDocument.create();

    const pageCount = srcDoc.getPageCount();

    // Re-render each page to a canvas and re-embed as a compressed JPEG image
    // This is the main size reduction path — it replaces embedded images + vectors with compressed rasters
    for (let i = 0; i < pageCount; i++) {
      setProgress(15 + Math.round((i / pageCount) * 70), `Compressing page ${i + 1} of ${pageCount}…`);
      await compressPage(srcDoc, outDoc, i);
    }

    setProgress(90, 'Saving…');
    compressedBytes = await outDoc.save();
    setProgress(100, 'Done!');

    showResult(selectedFile.size, compressedBytes.byteLength);

  } catch (err) {
    console.error(err);
    alert('Something went wrong: ' + err.message);
    document.getElementById('progress-wrap').style.display = 'none';
  }

  btn.disabled = false;
  btn.textContent = 'Compress Again';
}

async function compressPage(srcDoc, outDoc, pageIndex) {
  const { PDFDocument } = PDFLib;

  // Copy the page into a temporary doc so we can render it via an iframe trick
  // We'll use the canvas approach: render each page to canvas → JPEG → embed
  const tempDoc = await PDFDocument.create();
  const [copiedPage] = await tempDoc.copyPages(srcDoc, [pageIndex]);
  tempDoc.addPage(copiedPage);
  const tempBytes = await tempDoc.save();

  // Use pdf.js-free approach: draw on canvas using the URL
  const blob = new Blob([tempBytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);

  const jpegBytes = await renderPageToJpeg(url, selectedQuality);
  URL.revokeObjectURL(url);

  const srcPage = srcDoc.getPage(pageIndex);
  const { width, height } = srcPage.getSize();

  // Scale up canvas resolution for quality
  const scale = getScale();
  const canvasW = Math.round(width * scale);
  const canvasH = Math.round(height * scale);

  const jpegImage = await outDoc.embedJpg(jpegBytes);
  const newPage = outDoc.addPage([width, height]);
  newPage.drawImage(jpegImage, { x: 0, y: 0, width, height });
}

function getScale() {
  // Higher quality = higher render resolution
  if (selectedQuality >= 70) return 1.5;
  if (selectedQuality >= 55) return 1.2;
  return 1.0;
}

function renderPageToJpeg(pdfUrl, quality) {
  return new Promise((resolve, reject) => {
    // We use an iframe with a canvas message bridge via pdf.js CDN
    // Simpler: use fetch + manual canvas rendering via pdf.js
    // Since we don't have pdf.js loaded, we use the img/canvas trick:
    // embed PDF in an <object> element and screenshot...
    // Actually, the most reliable client-side approach without pdf.js is:
    // render using an offscreen iframe + html2canvas — but that's also complex.
    //
    // Instead, we use the pure pdf-lib image extraction + canvas re-encoding approach.
    // For pages without raster images (vector/text only), we do a simpler optimisation.

    // Load pdf.js on demand
    if (!window.pdfjsLib) {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      script.onload = () => {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        doRender();
      };
      script.onerror = reject;
      document.head.appendChild(script);
    } else {
      doRender();
    }

    function doRender() {
      pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
        return pdf.getPage(1);
      }).then(page => {
        const scale = getScale();
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d');
        return page.render({ canvasContext: ctx, viewport }).promise.then(() => {
          canvas.toBlob(blob => {
            blob.arrayBuffer().then(buf => resolve(new Uint8Array(buf)));
          }, 'image/jpeg', quality / 100);
        });
      }).catch(reject);
    }
  });
}

function showResult(originalSize, compressedSize) {
  const saved = originalSize - compressedSize;
  const pct = ((saved / originalSize) * 100).toFixed(1);

  document.getElementById('r-original').textContent = fmtBytes(originalSize);
  document.getElementById('r-compressed').textContent = fmtBytes(compressedSize);

  const savedEl = document.getElementById('r-saved');
  if (saved > 0) {
    savedEl.textContent = pct + '%';
    savedEl.className = 's-value green';
  } else {
    savedEl.textContent = '+' + fmtBytes(Math.abs(saved));
    savedEl.className = 's-value red';
  }

  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('result').style.display = 'block';
}

function downloadResult() {
  if (!compressedBytes) return;
  const blob = new Blob([compressedBytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const orig = selectedFile.name.replace(/\.pdf$/i, '');
  a.download = orig + '-compressed.pdf';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 10000);
}

function fmtBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}
</script>
</body>
</html>
